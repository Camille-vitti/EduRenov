<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduRénov — Dashboard Innovation</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00d4aa;
    --accent2: #3b82f6;
    --accent3: #f59e0b;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --red: #ef4444;
    --green: #10b981;
    --orange: #f97316;
    --purple: #8b5cf6;
    --pink: #ec4899;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0a0e1a 0%, #0d1f3c 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo-area { display: flex; align-items: center; gap: 14px; }
  .logo-badge {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: #0a0e1a;
  }
  header h1 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; }
  header h1 span { color: var(--accent); }
  .header-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .header-right { display: flex; gap: 10px; align-items: center; }
  .export-btn {
    padding: 8px 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    font-family: 'DM Sans', sans-serif;
  }
  .export-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* MAIN */
  main { padding: 28px 32px; max-width: 1600px; margin: 0 auto; }

  /* KPI SECTION */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: transform .2s, border-color .2s;
  }
  .kpi-card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .kpi-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
  }
  .kpi-card.k1::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .kpi-card.k2::before { background: linear-gradient(90deg, var(--accent2), var(--purple)); }
  .kpi-card.k3::before { background: linear-gradient(90deg, var(--accent3), var(--orange)); }
  .kpi-card.k4::before { background: linear-gradient(90deg, var(--green), var(--accent)); }
  .kpi-card.k5::before { background: linear-gradient(90deg, var(--pink), var(--red)); }
  .kpi-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
  .kpi-value { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; line-height: 1; }
  .kpi-sub { font-size: 12px; color: var(--text2); margin-top: 6px; }

  /* FILTERS */
  .filter-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 24px;
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .filter-bar label { font-size: 12px; color: var(--text2); margin-bottom: 4px; display: block; }
  .filter-group { display: flex; flex-direction: column; }
  .filter-bar input, .filter-bar select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 8px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color .2s;
  }
  .filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); }
  .filter-bar input { min-width: 240px; }
  .filter-bar select { min-width: 190px; }
  .reset-btn {
    margin-top: 18px;
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    font-family: 'DM Sans', sans-serif;
  }
  .reset-btn:hover { border-color: var(--red); color: var(--red); }

  /* CHARTS ROW */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
  }
  .chart-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text2);
    margin-bottom: 18px;
  }

  /* BAR CHART */
  .bar-chart { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .bar-name { font-size: 12px; color: var(--text2); width: 190px; flex-shrink: 0; text-align: right;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 24px; background: var(--surface2); border-radius: 6px; overflow: hidden; position: relative; }
  .bar-fill {
    height: 100%; border-radius: 6px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .6s cubic-bezier(.4,0,.2,1), opacity .2s;
    display: flex; align-items: center; justify-content: flex-end; padding-right: 8px;
    position: relative;
  }
  .bar-fill.active-filter { background: linear-gradient(90deg, var(--accent3), var(--orange)); }
  .bar-count { font-size: 11px; font-weight: 700; color: #0a0e1a; }
  .bar-row:hover .bar-fill { opacity: .85; }

  /* DONUT */
  .donut-wrap { display: flex; align-items: center; gap: 20px; }
  #defiDonut { width: 120px; height: 120px; flex-shrink: 0; }
  .donut-legend { display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; padding: 6px 10px; border-radius: 8px;
    transition: background .2s; font-size: 13px;
  }
  .legend-item:hover, .legend-item.active { background: var(--surface2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-count { margin-left: auto; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }

  /* TRL dots */
  .trl-list { display: flex; flex-direction: column; gap: 10px; }
  .trl-row { display: flex; align-items: center; gap: 10px; cursor: pointer; border-radius: 8px; padding: 4px 6px; transition: background .2s; }
  .trl-row:hover { background: var(--surface2); }
  .trl-dots { display: flex; gap: 4px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); }
  .dot.filled { background: var(--accent); }
  .trl-label { font-size: 12px; color: var(--text2); flex: 1; }
  .trl-num { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; color: var(--text); }

  /* RESULTS COUNT */
  .results-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .results-count { font-size: 13px; color: var(--text2); }
  .results-count span { color: var(--accent); font-weight: 700; }

  /* TABLE */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--surface2); border-bottom: 1px solid var(--border); }
  thead th {
    padding: 13px 16px;
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text2);
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: var(--accent); }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .15s;
    cursor: pointer;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 12px 16px; font-size: 13px; vertical-align: middle; }

  .company-cell { display: flex; align-items: center; gap: 10px; }
  .company-avatar {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 12px; color: #0a0e1a;
    flex-shrink: 0;
  }
  .company-name { font-weight: 500; }
  .company-solution { font-size: 11px; color: var(--text2); margin-top: 2px; max-width: 180px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .cat-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .cat-tag {
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 500;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    white-space: nowrap;
  }
  .cat-tag.env { border-color: #065f46; color: var(--green); background: #022c22; }
  .cat-tag.mat { border-color: #1e40af; color: #93c5fd; background: #0c1a3d; }
  .cat-tag.sol { border-color: #78350f; color: var(--accent3); background: #2d1505; }
  .cat-tag.ven { border-color: #4c1d95; color: #c4b5fd; background: #1a0f3d; }
  .cat-tag.pil { border-color: #831843; color: #f9a8d4; background: #2d0f22; }
  .cat-tag.aut { border-color: #1f2937; color: var(--text2); background: var(--surface2); }

  .badge {
    padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .badge-ete { background: #2d1505; color: var(--accent3); border: 1px solid #78350f; }
  .badge-renov { background: #022c22; color: var(--green); border: 1px solid #065f46; }

  .trl-badge {
    padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
    white-space: nowrap;
  }
  .trl-9 { background: #022c22; color: var(--green); border: 1px solid #065f46; }
  .trl-8 { background: #0c1a3d; color: #93c5fd; border: 1px solid #1e40af; }
  .trl-7 { background: #1a0f3d; color: #c4b5fd; border: 1px solid #4c1d95; }
  .trl-6 { background: #2d1505; color: var(--accent3); border: 1px solid #78350f; }
  .trl-4 { background: #2d0f22; color: #f9a8d4; border: 1px solid #831843; }
  .trl-0 { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }

  .size-badge { font-size: 12px; color: var(--text2); }

  /* EVAL BUTTON */
  .eval-btn {
    padding: 5px 12px;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all .2s;
  }
  .eval-btn.pending { background: var(--surface2); border-color: var(--border); color: var(--text2); }
  .eval-btn.pending:hover { border-color: var(--accent2); color: var(--accent2); }
  .eval-btn.accepted { background: #022c22; border-color: #065f46; color: var(--green); }
  .eval-btn.rejected { background: #2d0f22; border-color: #831843; color: #f9a8d4; }
  .eval-btn.shortlisted { background: #0c1a3d; border-color: #1e40af; color: #93c5fd; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(10,14,26,.85); backdrop-filter: blur(6px);
    z-index: 1000; overflow-y: auto; padding: 40px 20px;
  }
  .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 820px;
    position: relative;
    animation: slideUp .3s cubic-bezier(.4,0,.2,1);
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
  .modal-header {
    padding: 28px 32px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 16px;
  }
  .modal-avatar {
    width: 56px; height: 56px; border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; color: #0a0e1a;
    flex-shrink: 0;
  }
  .modal-company { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; }
  .modal-solution { font-size: 14px; color: var(--accent); margin-top: 4px; font-style: italic; }
  .modal-close {
    margin-left: auto; flex-shrink: 0;
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }
  .modal-close:hover { border-color: var(--red); color: var(--red); }
  .modal-body { padding: 28px 32px; }
  .modal-meta {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px;
  }
  .meta-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
  }
  .meta-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text2); margin-bottom: 4px; }
  .meta-value { font-size: 13px; font-weight: 500; }

  .modal-section { margin-bottom: 20px; }
  .section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: .1em;
    color: var(--accent); font-weight: 700; margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .section-text { font-size: 14px; color: var(--text2); line-height: 1.7; }

  .modal-eval-bar {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px 22px;
    display: flex; align-items: center; gap: 14px;
    margin-top: 24px;
  }
  .eval-label { font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .eval-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .modal-eval-btn {
    padding: 8px 16px; border-radius: 8px;
    font-size: 13px; font-weight: 600;
    border: 1px solid; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all .2s;
  }
  .meb-accept { background: #022c22; border-color: #065f46; color: var(--green); }
  .meb-accept:hover { background: #065f46; }
  .meb-shortlist { background: #0c1a3d; border-color: #1e40af; color: #93c5fd; }
  .meb-shortlist:hover { background: #1e40af; }
  .meb-reject { background: #2d0f22; border-color: #831843; color: #f9a8d4; }
  .meb-reject:hover { background: #831843; }
  .meb-pending { background: var(--surface); border-color: var(--border); color: var(--text2); }
  .meb-pending:hover { border-color: var(--text2); }

  .note-area { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
  .note-area label { font-size: 13px; color: var(--text2); flex-shrink: 0; }
  .star-rating { display: flex; gap: 4px; }
  .star { font-size: 20px; cursor: pointer; color: var(--border); transition: color .15s; }
  .star.active { color: var(--accent3); }
  .modal-site-link {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--accent2); font-size: 13px; text-decoration: none;
    padding: 6px 12px; background: var(--surface2); border-radius: 8px;
    border: 1px solid var(--border); transition: all .2s;
  }
  .modal-site-link:hover { border-color: var(--accent2); }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text2);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 16px; }

  @media (max-width: 1200px) {
    .kpi-grid { grid-template-columns: repeat(3, 1fr); }
    .charts-row { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 768px) {
    main { padding: 16px; }
    .kpi-grid { grid-template-columns: 1fr 1fr; }
    .charts-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="logo-badge">ER</div>
    <div>
      <h1>Edu<span>Rénov</span> — Innovation</h1>
      <div class="header-sub">Tableau de bord des candidatures 2026</div>
    </div>
  </div>
  <div class="header-right">
    <button class="export-btn" onclick="exportCSV()">↓ Exporter CSV</button>
  </div>
</header>

<main>
  <!-- KPI -->
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- FILTERS -->
  <div class="filter-bar">
    <div class="filter-group">
      <label>🔍 Recherche</label>
      <input type="text" id="searchInput" placeholder="Entreprise, solution, description…" oninput="applyFilters()">
    </div>
    <div class="filter-group">
      <label>🎯 Défi</label>
      <select id="defiFilter" onchange="applyFilters()">
        <option value="">Tous les défis</option>
        <option>Solutions de confort d'été</option>
        <option>Rénovation responsable</option>
      </select>
    </div>
    <div class="filter-group">
      <label>📂 Catégorie</label>
      <select id="catFilter" onchange="applyFilters()">
        <option value="">Toutes les catégories</option>
        <option>Environnement extérieur du bâtiment</option>
        <option>Matériaux et composants à comportement thermique</option>
        <option>Solutions passives de refroidissement</option>
        <option>Ventilation et rafraîchissements innovants</option>
        <option>Pilotage des usages</option>
        <option>Autre: Etanchéité à l'air des bâtiments</option>
      </select>
    </div>
    <div class="filter-group">
      <label>📊 TRL</label>
      <select id="trlFilter" onchange="applyFilters()">
        <option value="">Tous les TRL</option>
        <option>Lancement commercial (TRL 9)</option>
        <option>Système achevé et qualifié (TRL 8)</option>
        <option>Prototype opérationnel (TRL 7)</option>
        <option>Démonstrateur pilote (TRL 6)</option>
        <option>Prototype de laboratoire (TRL 4)</option>
      </select>
    </div>
    <div class="filter-group">
      <label>✅ Statut</label>
      <select id="statutFilter" onchange="applyFilters()">
        <option value="">Tous les statuts</option>
        <option>En attente</option>
        <option>Sélectionné</option>
        <option>En liste courte</option>
        <option>Rejeté</option>
      </select>
    </div>
    <button class="reset-btn" onclick="resetFilters()">✕ Réinitialiser</button>
  </div>

  <!-- CHARTS -->
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">Par Défi</div>
      <div class="donut-wrap">
        <canvas id="defiDonut" width="120" height="120"></canvas>
        <div class="donut-legend" id="defiLegend"></div>
      </div>
    </div>
    <div class="chart-card" style="grid-column: span 1;">
      <div class="chart-title">Par Catégorie</div>
      <div class="bar-chart" id="catChart"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Maturité (TRL)</div>
      <div class="trl-list" id="trlChart"></div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="results-header">
    <div class="results-count">Affichage de <span id="countDisplay">0</span> candidature(s)</div>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortTable('entreprise')">Entreprise ↕</th>
          <th onclick="sortTable('defi')">Défi ↕</th>
          <th>Catégories</th>
          <th onclick="sortTable('trl')">TRL ↕</th>
          <th onclick="sortTable('taille')">Taille ↕</th>
          <th onclick="sortTable('ville')">Ville ↕</th>
          <th>Évaluation</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div id="emptyState" class="empty-state" style="display:none">
      <div class="icon">🔍</div>
      <p>Aucune candidature ne correspond à vos filtres.</p>
    </div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-header" id="modalHeader"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>

  ['#00d4aa','#3b82f6'],['#f59e0b','#f97316'],['#8b5cf6','#ec4899'],

function getInitials(name) {
  return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase().slice(0,2);
}

function getCatClass(cat) {
  if (cat.includes('Environnement')) return 'env';
  if (cat.includes('Matériaux')) return 'mat';
  if (cat.includes('passives')) return 'sol';
  if (cat.includes('Ventilation')) return 'ven';
  if (cat.includes('Pilotage')) return 'pil';
  return 'aut';
}

function getTRLClass(trl) {
  if (!trl) return 'trl-0';
  if (trl.includes('9')) return 'trl-9';
  if (trl.includes('8')) return 'trl-8';
  if (trl.includes('7')) return 'trl-7';
  if (trl.includes('6')) return 'trl-6';
  if (trl.includes('4')) return 'trl-4';
  return 'trl-0';
}

function getTRLShort(trl) {
  if (!trl) return 'N/A';
  const m = trl.match(/TRL\s*(\d+)/);
  return m ? `TRL ${m[1]}` : trl.split('(')[0].trim();
}

function renderDonut() {
  const ete = filteredData.filter(d=>d.defi.includes('confort')).length;
  const renov = filteredData.filter(d=>d.defi.includes('Rénovation')).length;
  const total = ete + renov;

  const canvas = document.getElementById('defiDonut');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,120,120);

  const cx=60, cy=60, r=48, lineW=14;
  if (total === 0) return;

  function drawArc(start, end, color) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, start, end);
    ctx.strokeStyle = color;
    ctx.lineWidth = lineW;
    ctx.stroke();
  }

  const gap = 0.05;
  const eteAngle = (ete/total) * (Math.PI*2 - gap*2);
  const renovAngle = (renov/total) * (Math.PI*2 - gap*2);

  drawArc(-Math.PI/2, -Math.PI/2 + eteAngle, '#f59e0b');
  drawArc(-Math.PI/2 + eteAngle + gap, -Math.PI/2 + eteAngle + gap + renovAngle, '#10b981');

  // Center text
  ctx.fillStyle = '#e2e8f0';
  ctx.font = 'bold 22px Syne, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(total, cx, cy-4);
  ctx.font = '10px DM Sans, sans-serif';
  ctx.fillStyle = '#94a3b8';
  ctx.fillText('total', cx, cy+12);

  const legend = document.getElementById('defiLegend');
  legend.innerHTML = `
    <div class="legend-item ${activeDefiFilter==="Solutions de confort d'été"?'active':''}" onclick="toggleDefiFilter(\"Solutions de confort d'été\")">
      <div class="legend-dot" style="background:#f59e0b"></div>
      <span>Confort d'été</span>
      <span class="legend-count" style="color:#f59e0b">${ete}</span>
    </div>
    <div class="legend-item ${activeDefiFilter==='Rénovation responsable'?'active':''}" onclick="toggleDefiFilter('Rénovation responsable')">
      <div class="legend-dot" style="background:#10b981"></div>
      <span>Rénovation responsable</span>
      <span class="legend-count" style="color:#10b981">${renov}</span>
    </div>
  `;
}

function renderTRLChart() {
  const trlMap = {};
  filteredData.forEach(d => {
    const k = d.trl || 'N/A';

  });
  const order = ['Lancement commercial (TRL 9)','Système achevé et qualifié (TRL 8)','Prototype opérationnel (TRL 7)','Démonstrateur pilote (TRL 6)','Prototype de laboratoire (TRL 4)',''];
  const dotsTotal = 9;
  const dotsFilled = {'Lancement commercial (TRL 9)':9,'Système achevé et qualifié (TRL 8)':8,'Prototype opérationnel (TRL 7)':7,'Démonstrateur pilote (TRL 6)':6,'Prototype de laboratoire (TRL 4)':4,'':0};

  document.getElementById('trlChart').innerHTML = order.filter(k=>trlMap[k]).map(trl => {
    const filled = dotsFilled[trl]||0;
    const dots = Array.from({length:dotsTotal},(_,i)=>`<div class="dot ${i<filled?'filled':''}"></div>`).join('');
    const label = trl ? getTRLShort(trl) : 'Non renseigné';
    return `
      <div class="trl-row" onclick="toggleTRLFilter('${trl.replace(/'/g,"\\'")}')">
        <div class="trl-dots">${dots}</div>
        <div class="trl-label">${label}</div>

}

}

function cycleEval(id, btn) {
  const cycle = ['En attente', 'En liste courte', 'Sélectionné', 'Rejeté'];
  const cur = evalStates[id];
  const next = cycle[(cycle.indexOf(cur)+1) % cycle.length];
  evalStates[id] = next;
  const classMap = {'En attente':'pending','Sélectionné':'accepted','En liste courte':'shortlisted','Rejeté':'rejected'};
  btn.className = `eval-btn ${classMap[next]}`;
  btn.textContent = next;
  renderKPIs();
}

function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const defi = document.getElementById('defiFilter').value;
  const cat = document.getElementById('catFilter').value;
  const trl = document.getElementById('trlFilter').value;
  const statut = document.getElementById('statutFilter').value;

  filteredData = DATA.filter(d => {
    if (search && !([d.entreprise, d.solution_nom, d.entreprise_desc, d.solution_desc].join(' ').toLowerCase().includes(search))) return false;
    if (defi && d.defi !== defi) return false;
    if (cat && !d.categories.includes(cat)) return false;
    if (trl && d.trl !== trl) return false;
    if (statut && evalStates[d.id] !== statut) return false;
    return true;
  });

  if (sortKey) {
    filteredData.sort((a,b) => {
      let av = a[sortKey]||'', bv = b[sortKey]||'';
      return av < bv ? -sortDir : av > bv ? sortDir : 0;
    });
  }

  renderKPIs();
  renderDonut();
  renderCatChart();
  renderTRLChart();
  renderTable();
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('defiFilter').value = '';
  document.getElementById('catFilter').value = '';
  document.getElementById('trlFilter').value = '';
  document.getElementById('statutFilter').value = '';
  activeDefiFilter = null;
  activeCatFilter = null;
  applyFilters();
}

function toggleDefiFilter(val) {
  if (activeDefiFilter === val) { activeDefiFilter = null; document.getElementById('defiFilter').value = ''; }
  else { activeDefiFilter = val; document.getElementById('defiFilter').value = val; }
  applyFilters();
}

function toggleCatFilter(val) {
  if (activeCatFilter === val) { activeCatFilter = null; document.getElementById('catFilter').value = ''; }
  else { activeCatFilter = val; document.getElementById('catFilter').value = val; }
  applyFilters();
}

function toggleTRLFilter(val) {
  document.getElementById('trlFilter').value = val;
  applyFilters();
}

function sortTable(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  applyFilters();
}

// MODAL
function openModal(id) {
  const d = DATA.find(x => x.id === id);
  if (!d) return;
  const [c1, c2] = getAvatarColors(d.id);

  document.getElementById('modalHeader').innerHTML = `
    <div class="modal-avatar" style="background:linear-gradient(135deg,${c1},${c2})">${getInitials(d.entreprise)}</div>
    <div>
      <div class="modal-company">${d.entreprise}</div>
      <div class="modal-solution">${d.solution_nom}</div>
      <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
        <span class="badge ${d.defi.includes('confort')?'badge-ete':'badge-renov'}">${d.defi}</span>
        <span class="trl-badge ${getTRLClass(d.trl)}">${d.trl||'TRL N/A'}</span>
        ${d.site ? `<a class="modal-site-link" href="${d.site.startsWith('http')?d.site:'https://'+d.site}" target="_blank">🌐 Site web ↗</a>` : ''}
      </div>
    </div>
    <button class="modal-close" onclick="closeModal()">✕</button>
  `;

  const cats = d.categories.map(c => `<span class="cat-tag ${getCatClass(c)}">${c.split('(')[0].trim()}</span>`).join('');

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-meta">
      <div class="meta-item">
        <div class="meta-label">Contact</div>
        <div class="meta-value">${d.contact}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Email</div>
        <div class="meta-value" style="font-size:12px">${d.email}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Téléphone</div>
        <div class="meta-value">${d.telephone}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Taille</div>
        <div class="meta-value">${d.taille}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Statut juridique</div>
        <div class="meta-value">${d.statut_juridique}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Ville</div>
        <div class="meta-value">${d.ville}</div>
      </div>
    </div>

    ${d.categories.length ? `
    <div class="modal-section">
      <div class="section-title">Catégories</div>
      <div class="cat-tags">${cats}</div>
    </div>` : ''}

    <div class="modal-section">
      <div class="section-title">À propos de l'entreprise</div>
      <div class="section-text">${d.entreprise_desc}</div>
    </div>

    <div class="modal-section">
      <div class="section-title">Description de la solution</div>
      <div class="section-text">${d.solution_desc}</div>
    </div>

    ${d.impact ? `<div class="modal-section">
      <div class="section-title">Impact (environnemental, social, économique)</div>
      <div class="section-text">${d.impact}</div>
    </div>` : ''}

    ${d.besoins ? `<div class="modal-section">
      <div class="section-title">Besoins vis-à-vis d'EduRénov</div>
      <div class="section-text">${d.besoins}</div>
    </div>` : ''}

    ${d.concurrents ? `<div class="modal-section">
      <div class="section-title">Concurrents & différenciation</div>
      <div class="section-text">${d.concurrents}</div>
    </div>` : ''}

    ${d.soutien ? `<div class="modal-section">
      <div class="section-title">Soutiens & partenaires</div>
      <div class="section-text">${d.soutien}</div>
    </div>` : ''}

    <div class="modal-eval-bar">
      <div>
        <div class="eval-label">Évaluation</div>
        <div class="eval-actions">
          <button class="modal-eval-btn meb-accept" onclick="setEval(${d.id},'Sélectionné')">✓ Sélectionné</button>
          <button class="modal-eval-btn meb-shortlist" onclick="setEval(${d.id},'En liste courte')">★ Liste courte</button>
          <button class="modal-eval-btn meb-reject" onclick="setEval(${d.id},'Rejeté')">✕ Rejeté</button>
          <button class="modal-eval-btn meb-pending" onclick="setEval(${d.id},'En attente')">↺ Réinitialiser</button>
        </div>
        <div class="note-area">
          <label>Note :</label>
          <div class="star-rating" id="starRating${d.id}">
            ${[1,2,3,4,5].map(n=>`<span class="star ${noteStates[d.id]>=n?'active':''}" onclick="setNote(${d.id},${n})">★</span>`).join('')}
          </div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('modalOverlay').classList.add('open');
}

function setEval(id, val) {
  evalStates[id] = val;
  renderKPIs();
  renderTable();
  // Update modal eval bar highlight
  document.querySelectorAll('.modal-eval-btn').forEach(b => b.style.opacity = '0.7');
  event.target.style.opacity = '1';
  event.target.style.outline = '2px solid currentColor';
}

function setNote(id, val) {
  noteStates[id] = val;
  const stars = document.getElementById('starRating'+id);
  if (!stars) return;
  stars.querySelectorAll('.star').forEach((s,i) => s.classList.toggle('active', i<val));
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
function closeModalOutside(e) {
  if (e.target.id === 'modalOverlay') closeModal();
}

function exportCSV() {
  const headers = ['Entreprise','Solution','Défi','Catégories','TRL','Taille','Ville','Email','Site','Évaluation','Note'];
  const rows = DATA.map(d => [
    d.entreprise, d.solution_nom, d.defi, d.categories.join(' | '),
    d.trl, d.taille, d.ville, d.email, d.site,
    evalStates[d.id], noteStates[d.id]
  ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv);
  a.download = 'edurnov_candidatures.csv';
  a.click();
}

// Init
applyFilters();
</script>
